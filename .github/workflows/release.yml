name: Release (build, push, deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/gonzapiccinini/onlylemon
  # Public URL baked into the dashboard SPA at build time.
  VITE_API_BASE_URL: https://app.onlylemon.app/api

jobs:
  build-worker:
    name: Build & push worker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-worker:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

  build-gateway:
    name: Build & push gateway image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-gateway:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max

  build-dashboard:
    name: Build & push dashboard image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-dashboard:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-dashboard:latest
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max

  deploy-dashboard-vps:
    name: Deploy to dashboard VPS
    needs: [build-worker, build-dashboard]
    if: ${{ vars.AUTO_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DASHBOARD_VPS_HOST }}
          username: ${{ secrets.DASHBOARD_VPS_USER }}
          key: ${{ secrets.DASHBOARD_VPS_SSH_KEY }}
          envs: GITHUB_SHA,GHCR_TOKEN,GHCR_USER,REPO
          script: |
            set -euo pipefail
            cd ~/onlylemon

            echo "[deploy] fetching latest main via HTTPS + token"
            git remote set-url origin "https://github.com/${REPO}.git"
            git -c http.extraheader="Authorization: Bearer ${GHCR_TOKEN}" fetch origin main
            git reset --hard origin/main

            echo "[deploy] logging into ghcr.io"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_TAG="sha-$GITHUB_SHA"
            echo "[deploy] pulling images for tag $IMAGE_TAG"
            docker compose -f docker-compose.dashboard-vps.yml pull

            echo "[deploy] applying compose"
            docker compose -f docker-compose.dashboard-vps.yml up -d --remove-orphans

            echo "[deploy] reloading caddy and alloy in case configs changed"
            docker compose -f docker-compose.dashboard-vps.yml restart caddy alloy

            echo "[deploy] pruning unused images"
            docker image prune -f
        env:
          GITHUB_SHA: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          REPO: ${{ github.repository }}

  deploy-waha-vps:
    name: Deploy to waha VPS
    needs: [build-gateway]
    if: ${{ vars.AUTO_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.WAHA_VPS_HOST }}
          username: ${{ secrets.WAHA_VPS_USER }}
          key: ${{ secrets.WAHA_VPS_SSH_KEY }}
          envs: GITHUB_SHA,GHCR_TOKEN,GHCR_USER,REPO
          script: |
            set -euo pipefail
            cd ~/onlylemon

            echo "[deploy] fetching latest main via HTTPS + token"
            git remote set-url origin "https://github.com/${REPO}.git"
            git -c http.extraheader="Authorization: Bearer ${GHCR_TOKEN}" fetch origin main
            git reset --hard origin/main

            echo "[deploy] logging into ghcr.io"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_TAG="sha-$GITHUB_SHA"
            echo "[deploy] pulling images for tag $IMAGE_TAG"
            docker compose -f docker-compose.waha-vps.yml pull

            echo "[deploy] applying compose"
            docker compose -f docker-compose.waha-vps.yml up -d --remove-orphans

            echo "[deploy] reloading caddy and alloy in case configs changed"
            docker compose -f docker-compose.waha-vps.yml restart caddy alloy

            echo "[deploy] pruning unused images"
            docker image prune -f
        env:
          GITHUB_SHA: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          REPO: ${{ github.repository }}
