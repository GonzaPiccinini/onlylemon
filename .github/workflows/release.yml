name: Release (build, push, deploy)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # IMAGE_PREFIX is computed per-step from github.repository (lowercased) so
  # the same workflow works in upstream and in every fork without edits:
  #   upstream:        ghcr.io/gonzapiccinini/onlylemon
  #   fork acme:       ghcr.io/onlylemon-acme/onlylemon
  # Public URL baked into the dashboard SPA at build time.
  # Set per-repo in Settings → Variables → VITE_API_BASE_URL (e.g. https://app.<tenant>.app/api).
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

jobs:
  build-worker:
    name: Build & push worker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          PREFIX="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "list=${PREFIX}-worker:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            {
              echo "list<<EOF"
              echo "${PREFIX}-worker:sha-${{ github.sha }}"
              echo "${PREFIX}-worker:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

  build-gateway:
    name: Build & push gateway image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          PREFIX="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "list=${PREFIX}-gateway:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            {
              echo "list<<EOF"
              echo "${PREFIX}-gateway:sha-${{ github.sha }}"
              echo "${PREFIX}-gateway:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max

  build-dashboard:
    name: Build & push dashboard image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          PREFIX="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "list=${PREFIX}-dashboard:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            {
              echo "list<<EOF"
              echo "${PREFIX}-dashboard:sha-${{ github.sha }}"
              echo "${PREFIX}-dashboard:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max

  deploy-dashboard-vps:
    name: Deploy to dashboard VPS
    needs: [build-worker, build-dashboard]
    if: ${{ vars.AUTO_DEPLOY == 'true' && github.ref_type != 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DASHBOARD_VPS_HOST }}
          username: ${{ secrets.DASHBOARD_VPS_USER }}
          key: ${{ secrets.DASHBOARD_VPS_SSH_KEY }}
          envs: GITHUB_SHA,GHCR_TOKEN,GHCR_USER,REPO
          script: |
            set -euo pipefail
            cd ~/onlylemon

            echo "[deploy] fetching latest main via HTTPS + token"
            git remote set-url origin "https://github.com/${REPO}.git"
            git fetch "https://x-access-token:${GHCR_TOKEN}@github.com/${REPO}.git" main
            git reset --hard FETCH_HEAD
            # FETCH_HEAD records the URL we fetched from, which would leave
            # the ephemeral token on disk. Scrub it.
            rm -f .git/FETCH_HEAD

            echo "[deploy] logging into ghcr.io"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_TAG="sha-$GITHUB_SHA"
            export IMAGE_PREFIX="ghcr.io/$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
            echo "[deploy] pulling $IMAGE_PREFIX-{worker,dashboard}:$IMAGE_TAG"
            # Only pull services we own. Third-party images (postgres, caddy,
            # alloy) stay on whatever the VPS already has.
            docker compose -f docker-compose.dashboard-vps.yml pull worker dashboard

            echo "[deploy] applying compose"
            docker compose -f docker-compose.dashboard-vps.yml up -d --remove-orphans

            echo "[deploy] reloading caddy and alloy in case configs changed"
            docker compose -f docker-compose.dashboard-vps.yml restart caddy alloy

            echo "[deploy] pruning unused images"
            docker image prune -f
        env:
          GITHUB_SHA: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          REPO: ${{ github.repository }}

  deploy-waha-vps:
    name: Deploy to waha VPS
    needs: [build-gateway]
    if: ${{ vars.AUTO_DEPLOY == 'true' && github.ref_type != 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.WAHA_VPS_HOST }}
          username: ${{ secrets.WAHA_VPS_USER }}
          key: ${{ secrets.WAHA_VPS_SSH_KEY }}
          envs: GITHUB_SHA,GHCR_TOKEN,GHCR_USER,REPO
          script: |
            set -euo pipefail
            cd ~/onlylemon

            echo "[deploy] fetching latest main via HTTPS + token"
            git remote set-url origin "https://github.com/${REPO}.git"
            git fetch "https://x-access-token:${GHCR_TOKEN}@github.com/${REPO}.git" main
            git reset --hard FETCH_HEAD
            # FETCH_HEAD records the URL we fetched from, which would leave
            # the ephemeral token on disk. Scrub it.
            rm -f .git/FETCH_HEAD

            echo "[deploy] logging into ghcr.io"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_TAG="sha-$GITHUB_SHA"
            export IMAGE_PREFIX="ghcr.io/$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
            echo "[deploy] pulling $IMAGE_PREFIX-gateway:$IMAGE_TAG"
            # Only pull services we own. Third-party images (waha, redis,
            # caddy, alloy) stay on whatever the VPS already has — WAHA Plus
            # in particular requires docker.io creds that live only on the VPS.
            docker compose -f docker-compose.waha-vps.yml pull gateway

            echo "[deploy] applying compose"
            docker compose -f docker-compose.waha-vps.yml up -d --remove-orphans

            echo "[deploy] reloading caddy and alloy in case configs changed"
            docker compose -f docker-compose.waha-vps.yml restart caddy alloy

            echo "[deploy] pruning unused images"
            docker image prune -f
        env:
          GITHUB_SHA: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          REPO: ${{ github.repository }}
