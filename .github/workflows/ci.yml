name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  worker:
    name: worker (typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      # prisma.config.ts reads DATABASE_URL via `env('DATABASE_URL')`, so it
      # must be set even for `prisma generate`. Dummy value matches the
      # Dockerfile build stage; no real DB is contacted.
      - run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  gateway:
    name: gateway (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: gateway/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build

  dashboard:
    name: dashboard (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  ci-pass:
    name: CI passed
    needs: [worker, gateway, dashboard]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.worker.result }}" != "success" ] || \
             [ "${{ needs.gateway.result }}" != "success" ] || \
             [ "${{ needs.dashboard.result }}" != "success" ]; then
            echo "One or more required CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."
