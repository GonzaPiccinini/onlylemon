services:
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '${WAHA_VPS_TS_IP}:6379:6379'
    networks: [backend]
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  waha:
    image: devlikeapro/waha-plus:gows
    restart: always
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}

      WAHA_DASHBOARD_ENABLED: ${WAHA_DASHBOARD_ENABLED}
      WHATSAPP_SWAGGER_ENABLED: ${WHATSAPP_SWAGGER_ENABLED}

      WHATSAPP_DEFAULT_ENGINE: ${WHATSAPP_DEFAULT_ENGINE}
      WAHA_NAMESPACE: ${WAHA_NAMESPACE}

      WAHA_BASE_URL: ${WAHA_BASE_URL}

      WAHA_LOG_FORMAT: ${WAHA_LOG_FORMAT}

      WAHA_LOG_LEVEL: ${WAHA_LOG_LEVEL}

      WAHA_PRINT_QR: ${WAHA_PRINT_QR}

      # ── Media storage (S3/R2) — comprobantes para auto-conversion OCR ──
      # El worker borra el objeto post-conversión (selectedMediaS3 → deleteReceipt),
      # y los archivos passed-over también se limpian en el finally del flujo.
      WAHA_MEDIA_STORAGE: ${WAHA_MEDIA_STORAGE:-S3}
      WAHA_S3_REGION: ${R2_REGION:-auto}
      WAHA_S3_BUCKET: ${WAHA_S3_BUCKET}
      WAHA_S3_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      WAHA_S3_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      WAHA_S3_ENDPOINT: ${R2_ENDPOINT}
      WAHA_S3_FORCE_PATH_STYLE: 'True'
      WAHA_S3_PROXY_FILES: 'True'
      WAHA_DOWNLOAD_MEDIA: 'True'
      WHATSAPP_DOWNLOAD_MEDIA: 'True'
      WHATSAPP_FILES_MIMETYPES: ${WHATSAPP_FILES_MIMETYPES:-image/jpeg,image/png,application/pdf}
      WHATSAPP_FILES_LIFETIME: ${WHATSAPP_FILES_LIFETIME:-7200}
    volumes:
      - waha_data:/app/.sessions
    networks: [backend]

  gateway:
    image: ${IMAGE_PREFIX:-ghcr.io/gonzapiccinini/onlylemon}-gateway:${IMAGE_TAG:-latest}
    build:
      context: ./gateway
    restart: always
    environment:
      PORT: 3000
      WEBHOOK_TOKEN_HEADER: ${WEBHOOK_TOKEN_HEADER}
      WEBHOOK_TOKEN_VALUE: ${WEBHOOK_TOKEN_VALUE}
      BULLMQ_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BULLMQ_QUEUE_NAME: ${BULLMQ_QUEUE_NAME}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MAX_PAYLOAD_BYTES: ${MAX_PAYLOAD_BYTES:-1048576}
      QUEUE_MAX_BACKLOG: ${QUEUE_MAX_BACKLOG:-10000}
      QUEUE_DEGRADED_BACKLOG: ${QUEUE_DEGRADED_BACKLOG:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: America/Argentina/Buenos_Aires
    depends_on:
      redis:
        condition: service_healthy
    networks: [backend]

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      API_DOMAIN: ${API_DOMAIN}
      WAHA_DOMAIN: ${WAHA_DOMAIN}
    volumes:
      - ./infra/waha-vps/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [gateway, waha]
    networks: [backend]

  alloy:
    image: grafana/alloy:latest
    restart: always
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    volumes:
      - ./infra/waha-vps/alloy.config:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GRAFANA_PROM_USER: ${GRAFANA_PROM_USER}
      GRAFANA_PROM_TOKEN: ${GRAFANA_PROM_TOKEN}
      GRAFANA_LOKI_USER: ${GRAFANA_LOKI_USER}
      GRAFANA_LOKI_TOKEN: ${GRAFANA_LOKI_TOKEN}
      GRAFANA_PROM_URL: ${GRAFANA_PROM_URL}
      GRAFANA_LOKI_URL: ${GRAFANA_LOKI_URL}
    networks: [backend]

volumes:
  redis_data:
  waha_data:
  caddy_data:
  caddy_config:

networks:
  backend:
    driver: bridge
